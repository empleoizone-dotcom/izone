<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso IZone B2B</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaXeDE2iz3sr-9dl-bIvKBQL7OW8nuAy0",
            authDomain: "izone-b2b-auth.firebaseapp.com",
            projectId: "izone-b2b-auth",
            storageBucket: "izone-b2b-auth.firebasestorage.app",
            messagingSenderId: "282285671483",
            appId: "1:282285671483:web:28122334529cf2f01ac81e",
            measurementId: "G-SHC91K519Z"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // 1. Escuchar si ya estamos logueados
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Si el usuario ya entró, enviarlo directamente
                window.location.replace("https://izone.izonelatam.work.gd/verificar-compra.html");
            }
        });

        // 2. Acción del botón
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("btnGoogle").addEventListener("click", () => {
                signInWithPopup(auth, provider).catch((error) => {
                    alert("Error: " + error.message);
                });
            });
        });
    </script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 12px 24px; cursor: pointer; background: white; border: 1px solid #ccc; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Acceso IZone B2B</h2>
        <button id="btnGoogle">Continuar con Google</button>
    </div>
</body>
</html>
