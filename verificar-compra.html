<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificación de Compra - IZone</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCP-qsv8Ig84wtzJn8CqKoggjVRFS62DRg&libraries=places"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 25px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Detalles de Facturación</h2>
        
        <label>Nombre de la Empresa</label>
        <input type="text" id="nombre" placeholder="Razón social">
        
        <label>RIF</label>
        <input type="text" id="rif" placeholder="J-00000000-0">
        
        <label>Teléfono de contacto</label>
        <input type="tel" id="telefono" placeholder="+58 412 0000000">
        
        <label>Dirección de entrega</label>
        <input type="text" id="direccion" placeholder="Escribe tu dirección...">

        <button id="btn-finalizar">Finalizar compra</button>
    </div>

    <script>
        const inputDir = document.getElementById('direccion');
        new google.maps.places.Autocomplete(inputDir, { 
            componentRestrictions: { country: 'VE' } 
        });

        document.getElementById('btn-finalizar').addEventListener('click', () => {
            const nombre = document.getElementById('nombre').value;
            const rif = document.getElementById('rif').value;
            const telefono = document.getElementById('telefono').value;
            const direccion = inputDir.value;

            if(nombre && rif && telefono && direccion) {
                alert("¡Gracias " + nombre + "! Datos recibidos. RIF: " + rif);
                // Aquí prepararemos el envío de estos datos a Firebase
            } else {
                alert("Por favor, completa todos los campos, incluyendo el RIF.");
            }
        });
    </script>
</body>
</html>
